name: Deploy
description: Deploy

inputs:
  cloudflare-token:
    description: "Cloudflare token"
    required: true
  server-ip:
    description: "Server ip"
    required: true
  ssh-user:
    description: "Ssh user"
    required: true
  ssh-private-key:
    description: "Ssh private key"
    required: true
  type:
    description: static | spa
    required: false
  domain:
    description: Domain
    required: false
  source:
    description: "Dir to deploy"
    required: false

runs:
  using: "composite"
  steps:
    - name: Ssh
      uses: webfactory/ssh-agent@v0.10.0
      with:
        ssh-private-key: ${{ inputs.ssh-private-key }}
    - name: Known hosts
      shell: bash
      run: ssh-keyscan ${{ inputs.server-ip }} >> ~/.ssh/known_hosts
    - name: Install lkw
      shell: bash
      run: |
        curl -L https://github.com/medvesek/infrastructure/releases/latest/download/lkw -o /usr/local/bin/lkw
        chmod +x /usr/local/bin/lkw
    - name: Run lkw
      shell: bash
      env:
        LKW_CLOUDFLARE_TOKEN: ${{ inputs.cloudflare-token }}
        LKW_SERVER_IP: ${{ inputs.server-ip }}
        LKW_SSH_USER: ${{ inputs.ssh-user }}
      run: |
        FLAGS=""
        [ -n "${{ inputs.type }}" ] && FLAGS="$FLAGS --type ${{ inputs.type }}"
        [ -n "${{ inputs.domain }}" ] && FLAGS="$FLAGS --domain ${{ inputs.domain }}"
        [ -n "${{ inputs.source }}" ] && FLAGS="$FLAGS --source ${{ inputs.source }}"
        lkw deploy $FLAGS
