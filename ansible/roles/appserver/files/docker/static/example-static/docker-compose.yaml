services:
  nginx:
    image: nginx
    networks:
      - traefik-net
    volumes:
      - ./public:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./default.conf:/etc/nginx/conf.d/default.conf
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.examle-static.rule=Host(`test-static.ajmuht.eu`)"
        - "traefik.http.routers.examle-static.entrypoints=websecure"
        - "traefik.http.routers.examle-static.tls.certresolver=le"
        - "traefik.http.services.examle-static.loadbalancer.server.port=80"

networks:
  traefik-net:
    external: true
